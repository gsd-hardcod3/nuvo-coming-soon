<style>
  :root{ --blue:#2456F3; --blue-deep:#1B45CC; --navy:#090061; --green:#77FF00; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Inter Tight",-apple-system,BlinkMacSystemFont,sans-serif;
    color:#fff; min-height:100dvh;
    background:radial-gradient(135% 120% at 50% -10%, #3a6bff 0%, var(--blue) 48%, var(--blue-deep) 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 24px;position:relative;overflow:hidden;
  }
  .watermark{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;opacity:.05}
  .watermark svg{width:min(115vw,115vh);height:auto}
  .wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;max-width:660px}
  .wordmark{width:clamp(210px,42vw,360px);height:auto;filter:drop-shadow(0 16px 36px rgba(0,0,0,.22))}
  .store{font-family:"Space Grotesk",sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.42em;font-size:clamp(15px,3vw,22px);color:var(--green);margin-top:-4px;padding-left:.42em}
  .soon{display:inline-flex;align-items:center;gap:10px;font-family:"Space Grotesk",sans-serif;font-weight:500;
    font-size:clamp(14px,2.7vw,17px);color:#fff;border:1.5px solid rgba(255,255,255,.45);
    padding:9px 20px;border-radius:999px;backdrop-filter:blur(2px)}
  .soon .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(119,255,0,.6);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(119,255,0,.5)}50%{opacity:.4;box-shadow:0 0 0 7px rgba(119,255,0,0)}}
  .tagline{font-size:clamp(15px,3.3vw,18px);color:rgba(255,255,255,.85);max-width:32ch;line-height:1.55}
  .actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:4px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:"Space Grotesk",sans-serif;font-weight:700;
    font-size:16px;text-decoration:none;padding:13px 24px;border-radius:14px;transition:transform .15s,box-shadow .15s,border-color .15s,background .15s}
  .btn svg{width:20px;height:20px;display:block}
  .btn-wa{background:var(--green);color:var(--navy);box-shadow:0 10px 26px rgba(119,255,0,.30)}
  .btn-wa:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(119,255,0,.45)}
  .btn-ig{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.45)}
  .btn-ig:hover{transform:translateY(-2px);border-color:#fff;background:rgba(255,255,255,.08)}
  .chip{display:inline-flex;align-items:center;gap:9px;font-family:"Space Grotesk",sans-serif;font-weight:700;
    font-size:16px;color:#fff;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.30);
    padding:12px 22px;border-radius:14px}
  .chip svg{width:20px;height:20px;display:block;color:var(--green)}
  .chip em{font-style:normal;font-weight:500;color:var(--green);font-size:14px;letter-spacing:.03em}
  footer{position:relative;z-index:1;margin-top:48px;font-size:13px;letter-spacing:.3px;color:rgba(255,255,255,.6);display:flex;flex-direction:column;gap:8px;align-items:center}
  footer b{color:rgba(255,255,255,.85);font-weight:600}
  .legal{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
  .legal a{color:rgba(255,255,255,.8);text-decoration:none;font-weight:500}
  .legal a:hover{color:#fff;text-decoration:underline}
